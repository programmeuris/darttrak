name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Keep in sync with ci.yml so deploy builds what CI validated.
          node-version: 22
          cache: npm
      - run: npm ci
      # Gate the deploy on the test suite: ci.yml runs on the same push but in a
      # parallel race, so without this a red main would still go live.
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # Pages occasionally rejects a deployment with a transient
      # "Deployment failed, try again later." — so do exactly that, once,
      # before failing the run for real. Without the retry a failed publish
      # leaves the site silently stale until the next push.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
